{% extends "base.html" %}

{% block title %}Timeline{% endblock %}

{% block content %}
<section class="team-section">
    <h1 class="hero-title" style="margin-bottom: 20px;">Timeline</h1>

    <form id="timeline-form" style="max-width: 500px; margin: 0 auto 40px auto; display: flex; flex-direction: column; gap: 10px;">
        <input id="name" placeholder="Name" required style="padding: 10px; border-radius: 6px; border: 1px solid #ccc;">
        <input id="email" type="email" placeholder="Email" required style="padding: 10px; border-radius: 6px; border: 1px solid #ccc;">
        <textarea id="content" placeholder="What's happening?" required style="padding: 10px; border-radius: 6px; border: 1px solid #ccc; min-height: 80px;"></textarea>
        <button type="submit" class="btn">Post</button>
    </form>

    <div id="posts" style="max-width: 500px; margin: 0 auto;"></div>
</section>

<script>
async function loadPosts() {
    const response = await fetch('/api/timeline_post');
    const data = await response.json();

    const postsDiv = document.getElementById("posts");
    postsDiv.innerHTML = "";

    data.timeline_posts.forEach(post => {
        const avatarUrl = `https://www.gravatar.com/avatar/?d=identicon`;
        postsDiv.innerHTML += `
            <div style="display:flex; gap:12px; padding:14px 0; border-bottom:1px solid #eee;">
                <img src="${avatarUrl}" width="48" height="48" style="border-radius:50%;">
                <div>
                    <h3 style="margin:0;">${post.name}</h3>
                    <p style="margin:4px 0;">${post.content}</p>
                    <small style="color:#888;">${post.created_at}</small>
                </div>
            </div>
        `;
    });
}

document.getElementById("timeline-form")
.addEventListener("submit", async function(event) {
    event.preventDefault();

    await fetch('/api/timeline_post', {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: new URLSearchParams({
            name: document.getElementById("name").value,
            email: document.getElementById("email").value,
            content: document.getElementById("content").value
        })
    });

    document.getElementById("timeline-form").reset();
    loadPosts();
});

loadPosts();
</script>
{% endblock %}
